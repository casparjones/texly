<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Texly fallback font families. These give documents a stable family name that
  always resolves to *something* in the bundled base set, so a missing font
  degrades visually instead of killing the compile. Use together with
  \IfFontExistsTF in the document preamble (see deploy/fontconfig/README.md).

  Serif intentionally prefers TeX Gyre Termes over EB Garamond: Debian's
  EB Garamond is the optical-size variant whose non-standard style names
  ("12 Bold"/"08 Regular") fontspec cannot auto-resolve from the bare family,
  which would defeat a "never fail" safety net. "EB Garamond 12" is kept as a
  later preference for when it is explicitly wanted.
-->
<fontconfig>
  <!-- Persistent cache for the opt-in dynamic font downloader
       (TEXLY_FONT_CACHE_DIR, default /data/fonts). Listed here so fontconfig
       scans fonts fetched at runtime. -->
  <dir>/data/fonts</dir>

  <alias binding="strong">
    <family>__texly_serif</family>
    <prefer>
      <family>TeX Gyre Termes</family>
      <family>EB Garamond 12</family>
      <family>Latin Modern Roman</family>
      <family>DejaVu Serif</family>
      <family>Noto Serif</family>
    </prefer>
  </alias>
  <alias binding="strong">
    <family>__texly_sans</family>
    <prefer>
      <family>TeX Gyre Heros</family>
      <family>DejaVu Sans</family>
      <family>Latin Modern Sans</family>
      <family>Noto Sans</family>
    </prefer>
  </alias>
  <alias binding="strong">
    <family>__texly_mono</family>
    <prefer>
      <family>TeX Gyre Cursor</family>
      <family>DejaVu Sans Mono</family>
      <family>Latin Modern Mono</family>
      <family>Noto Sans Mono</family>
    </prefer>
  </alias>
</fontconfig>
