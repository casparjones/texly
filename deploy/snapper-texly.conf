# Snapper config for the Texly projects volume.
#
# Install to /etc/snapper/configs/texly on the CapRover host. The subvolume
# must be the Btrfs subvolume that backs the Docker named volume mounted at
# /data (users/, home/, share/) inside the container.
#
# Create the config the supported way (which also registers it in
# /etc/conf.d/snapper) instead of copying this file by hand:
#
#   snapper -c texly create-config /var/lib/docker/volumes/texly-data/_data
#   # then merge the tuned values below into /etc/snapper/configs/texly
#
# Values below are tuned for a low-write, solo LaTeX editor: hourly snapshots,
# a modest retention window, no per-user ACL delegation.

SUBVOLUME="/var/lib/docker/volumes/texly-data/_data"
FSTYPE="btrfs"

# Only root may browse/restore snapshots.
ALLOW_USERS=""
ALLOW_GROUPS=""
SYNC_ACL="no"

# Take a timeline snapshot on the systemd timer (snapper-timeline.timer).
TIMELINE_CREATE="yes"
TIMELINE_CLEANUP="yes"

# Retention: keep enough granularity to recover a botched edit, without
# letting snapshots accumulate forever on a single-user box.
TIMELINE_MIN_AGE="1800"
TIMELINE_LIMIT_HOURLY="24"
TIMELINE_LIMIT_DAILY="14"
TIMELINE_LIMIT_WEEKLY="8"
TIMELINE_LIMIT_MONTHLY="6"
TIMELINE_LIMIT_YEARLY="2"

# Number-based cleanup for manual (pre/post) snapshots.
NUMBER_CLEANUP="yes"
NUMBER_MIN_AGE="1800"
NUMBER_LIMIT="50"
NUMBER_LIMIT_IMPORTANT="10"

EMPTY_PRE_POST_CLEANUP="yes"
